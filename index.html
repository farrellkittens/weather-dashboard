<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header">
  <span>NWS Hourly Weather Forecast Graph</span>
</div>

<div id="page-tabs">
  <a href="index.html" class="tab active">Weather Dashboard</a>
  <a href="peaks.html" class="tab">Summit Weather Rose</a>
  <a href="diving.html" class="tab">Diving Conditions</a>
</div>

<div id="controls">
  <span class="control-group">
    <label>City, State:</label>
    <span class="city-input-wrap">
      <input id="city" placeholder="Denver, CO" autocomplete="off" oninput="debounceSuggest()">
      <button id="use-location" class="use-location-button" type="button" onclick="useDashboardBrowserLocation()" aria-label="Get my location" title="Get my location"></button>
    </span>
  </span>
  <span class="control-group">
    <label>Lat, Lon:</label>
    <input id="coords" value="39.741678, -104.976111" placeholder="lat, lon" onkeydown="if(event.key==='Enter')loadForecast()">
  </span>
  <label class="share-location-toggle">
    <input id="share-location" type="checkbox">
    <span>Use this location on all tabs</span>
  </label>
  <span class="control-group">
    <label>Start:</label>
    <select id="startSel"></select>
    <button onclick="applyStart()">Go</button>
  </span>
  <div id="loc"></div>
</div>

<nav id="mobile-section-nav" aria-label="Weather section jumps"></nav>

<div id="city-suggestions"></div>
<div id="status">Loading…</div>
<div id="chart-shell">
  <div id="chart-wrap">
    <div id="chart-stage">
      <canvas id="c"></canvas>
      <canvas id="axis-c" aria-hidden="true"></canvas>
    </div>
  </div>
</div>
<div id="tip"></div>
<div id="footer">Data: NOAA/NWS api.weather.gov — times shown in local browser timezone<span id="grid-ref"></span></div>

<script src="shared-location.js"></script>
<script src="app.js"></script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
